<!--
  TLS Configuration — Agent/Manager Communication
  Wazuh 4.14.4 | Database Activity Monitoring

  Referências regulatórias:
    - RGPD Art. 32: Segurança do tratamento — encriptação de dados em trânsito
    - PCI-DSS 10.5: Proteger trilhos de auditoria contra alteração não autorizada
    - NIS2 Art. 21: Medidas de gestão de risco de cibersegurança

  Inserir este snippet dentro de <ossec_config> no ossec.conf do Manager.
  Certificados devem estar em /var/ossec/etc/sslmanager.cert e sslmanager.key.
-->

<auth>
  <!-- CA para validação dos certificados dos agentes -->
  <ssl_agent_ca>/var/ossec/etc/rootCA.pem</ssl_agent_ca>

  <!-- Verificação do hostname do agente contra o certificado -->
  <ssl_verify_host>yes</ssl_verify_host>

  <!-- Desativar auto-negociação para forçar cipher suite segura -->
  <ssl_auto_negotiate>no</ssl_auto_negotiate>

  <!-- Cipher suite — excluir algoritmos fracos (ADH, MD5, RC4, 3DES) -->
  <ssl_ciphers>HIGH:!ADH:!MD5:!RC4:!3DES</ssl_ciphers>
</auth>

<!--
  Notas de implementação:
  - Gerar certificados com: /var/ossec/bin/wazuh-authd -k ... -x ...
  - O rootCA.pem deve conter a CA que assinou os certificados dos agentes
  - Em cluster (master + worker01), replicar certificados em ambos os nós
  - Verificar com: openssl s_client -connect <manager_ip>:1515
-->
