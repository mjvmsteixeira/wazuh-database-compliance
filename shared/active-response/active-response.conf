<!--
  Active Response Configuration — Database Brute-Force Protection
  Wazuh 4.14.4 | Database Activity Monitoring

  Referências regulatórias:
    - PCI-DSS 10.6.1: Revisão e resposta a eventos de segurança
    - RGPD Art. 32(1)(b): Capacidade de assegurar resiliência permanente dos sistemas
    - NIS2 Art. 21(2)(b): Tratamento de incidentes

  Inserir dentro de <ossec_config> no ossec.conf do Manager.
  IMPORTANTE: Ajustar white_list aos IPs reais da infraestrutura antes de ativar.
-->

<!-- IPs que NUNCA serão bloqueados — ajustar aos IPs reais da infra -->
<global>
  <white_list>10.0.0.0/8</white_list>
  <white_list>192.168.0.0/16</white_list>
  <white_list>127.0.0.1</white_list>
</global>

<!--
  Resposta automática: firewall-drop para brute-force em bases de dados

  Rule IDs monitorizados:
    100203 — MySQL/MariaDB brute-force (múltiplas falhas de autenticação)
    100213 — PostgreSQL brute-force (múltiplas falhas de autenticação)
    100272 — MSSQL brute-force (múltiplas falhas de login)

  Comportamento:
    - Timeout base: 600 segundos (10 minutos)
    - Reincidentes: 30m, 60m, 120m, 240m, 480m (escalonamento progressivo)
    - Execução no agente onde o evento foi detetado
-->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100203,100213,100272</rules_id>
  <timeout>600</timeout>
  <repeated_offenders>30,60,120,240,480</repeated_offenders>
</active-response>

<!--
  Notas:
  - Testar SEMPRE em ambiente de staging antes de ativar em produção
  - Monitorizar /var/ossec/logs/active-responses.log para verificar bloqueios
  - Para desbloquear manualmente: /var/ossec/active-response/bin/firewall-drop delete - <IP>
  - Em ambientes com load balancer, considerar location=server para bloquear no manager
-->
