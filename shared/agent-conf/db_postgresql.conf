<!--
  Agent Configuration — Grupo db_postgresql
  Wazuh 4.14.4 | Database Activity Monitoring

  Aplicado automaticamente a agentes no grupo db_postgresql.
  Colocar em: /var/ossec/etc/shared/db_postgresql/agent.conf (no Manager)

  Pré-requisitos no agente:
    - postgresql.conf: log_destination='csvlog' ou 'stderr'
    - pgaudit instalado e configurado (pgaudit.log='all')
    - Logs em /var/lib/postgresql/*/main/pg_log/
    - Permissões de leitura para o utilizador ossec

  Referências regulatórias:
    - PCI-DSS 10.2: Registar eventos auditáveis
    - RGPD Art. 30: Registos das atividades de tratamento
-->

<agent_config>

  <!-- Labels para identificação nos dashboards e regras -->
  <labels>
    <label key="database_type">postgresql</label>
  </labels>

  <!-- Recolha dos logs do PostgreSQL (pgaudit) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/lib/postgresql/*/main/pg_log/*.log</location>
  </localfile>

  <!-- Monitorização de integridade das configurações PostgreSQL -->
  <syscheck>
    <directories realtime="yes" report_changes="yes">/etc/postgresql</directories>
  </syscheck>

</agent_config>
