<!--
  Agent Configuration — Grupo db_mssql (Windows)
  Wazuh 4.14.4 | Database Activity Monitoring

  Aplicado automaticamente a agentes no grupo db_mssql.
  Colocar em: /var/ossec/etc/shared/db_mssql/agent.conf (no Manager)

  Pré-requisitos no agente Windows:
    - SQL Server Audit configurado com output para ficheiro JSON
    - Log em C:\Logs\MSSQL\wazuh_mssql_audit.log
    - Directório C:\Logs\MSSQL\Audit para ficheiros de auditoria SQL Server
    - Serviço Wazuh Agent com permissões de leitura nos ficheiros

  Referências regulatórias:
    - PCI-DSS 10.2: Registar eventos auditáveis
    - RGPD Art. 30: Registos das atividades de tratamento
-->

<agent_config os="Windows">

  <!-- Labels para identificação nos dashboards e regras -->
  <labels>
    <label key="database_type">mssql</label>
  </labels>

  <!-- Recolha do log de auditoria MSSQL em formato JSON -->
  <localfile>
    <log_format>json</log_format>
    <location>C:\Logs\MSSQL\wazuh_mssql_audit.log</location>
  </localfile>

  <!-- Monitorização de integridade do directório de auditoria MSSQL -->
  <syscheck>
    <directories realtime="yes">C:\Logs\MSSQL\Audit</directories>
  </syscheck>

</agent_config>
