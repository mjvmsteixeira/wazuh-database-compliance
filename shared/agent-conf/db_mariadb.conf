<!--
  Agent Configuration — Grupo db_mariadb
  Wazuh 4.14.4 | Database Activity Monitoring

  Aplicado automaticamente a agentes no grupo db_mariadb.
  Colocar em: /var/ossec/etc/shared/db_mariadb/agent.conf (no Manager)

  Pré-requisitos no agente:
    - MariaDB Audit Plugin activo (server_audit_logging=ON)
    - Log de auditoria em /var/log/mysql/audit.log
    - Permissões de leitura para o utilizador ossec no ficheiro de log

  Referências regulatórias:
    - PCI-DSS 10.2: Registar eventos auditáveis
    - RGPD Art. 30: Registos das atividades de tratamento
-->

<agent_config>

  <!-- Labels para identificação nos dashboards e regras -->
  <labels>
    <label key="database_type">mariadb</label>
  </labels>

  <!-- Recolha do log de auditoria do MariaDB Audit Plugin -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/mysql/audit.log</location>
  </localfile>

  <!-- Monitorização de integridade das configurações MySQL/MariaDB -->
  <syscheck>
    <directories realtime="yes" report_changes="yes">/etc/mysql</directories>
  </syscheck>

</agent_config>
