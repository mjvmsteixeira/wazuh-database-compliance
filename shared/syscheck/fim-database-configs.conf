<!--
  FIM — File Integrity Monitoring for Database Configuration Files
  Wazuh 4.14.4 | Database Activity Monitoring

  Monitorização de integridade dos ficheiros de configuração de todas as BDs.
  Inserir dentro de <syscheck> no ossec.conf do agente ou via agent.conf centralizado.

  Referências regulatórias:
    - PCI-DSS 10.5.5: Usar software de monitorização de integridade em logs
    - PCI-DSS 11.5: Implementar mecanismo de deteção de alterações
    - RGPD Art. 32(1)(b): Capacidade de assegurar integridade permanente dos sistemas
    - NIS2 Art. 21(2)(d): Segurança da cadeia de abastecimento

  report_changes=yes permite ver o diff exacto da alteração (útil para auditoria).
  realtime=yes usa inotify (Linux) para deteção imediata.
-->

<!-- ==================== MySQL / MariaDB ==================== -->
<!-- Directório principal de configuração e ficheiro global -->
<directories realtime="yes" report_changes="yes" check_all="yes">/etc/mysql</directories>
<directories realtime="yes" report_changes="yes" check_all="yes">/etc/my.cnf</directories>

<!-- ==================== PostgreSQL ==================== -->
<!-- Inclui postgresql.conf, pg_hba.conf, pg_ident.conf -->
<directories realtime="yes" report_changes="yes" check_all="yes">/etc/postgresql</directories>

<!-- ==================== Oracle ==================== -->
<!-- Configurações de rede Oracle (listener.ora, tnsnames.ora, sqlnet.ora) -->
<directories realtime="yes" report_changes="yes" check_all="yes">/etc/oracle</directories>
<!-- NOTA: Ajustar o path abaixo ao ORACLE_HOME real do ambiente -->
<!-- Exemplo: /u01/app/oracle/product/19.0.0/dbhome_1/network/admin -->
<directories realtime="yes" report_changes="yes" check_all="yes">/opt/oracle/product/19c/dbhome_1/network/admin</directories>

<!-- ==================== Microsoft SQL Server (Windows) ==================== -->
<!--
  Para agentes Windows, incluir via agent.conf do grupo db_mssql.
  check_all=yes inclui: size, permissions, owner, group, mtime, sha256.
  Sem realtime para evitar overhead excessivo em directórios grandes do SQL Server.
-->
<!--
<directories check_all="yes" report_changes="yes">C:\Program Files\Microsoft SQL Server</directories>
-->

<!--
  Notas:
  - Em Linux, realtime usa inotify — verificar limite: sysctl fs.inotify.max_user_watches
  - Para MSSQL (Windows), a secção comentada acima deve ser activada no agent.conf do grupo db_mssql
  - O path Oracle deve ser ajustado ao ORACLE_HOME específico do ambiente
  - Excluir ficheiros temporários se necessário com <ignore>
-->
