# ============================================================
# Logrotate — MySQL Audit Log
# Destino: /etc/logrotate.d/mysql-audit
# ============================================================
#
# INSTALAÇÃO:
#   cp logrotate.conf /etc/logrotate.d/mysql-audit
#   chmod 644 /etc/logrotate.d/mysql-audit
#   logrotate -d /etc/logrotate.d/mysql-audit   # testar (dry-run)
#
/var/log/mysql/audit.log {
    # Rodar diariamente
    daily

    # Manter 90 dias de logs locais
    # Retenção de longo prazo (12 meses PCI-DSS 10.7) é gerida pelo OpenSearch ILM
    rotate 90

    # Comprimir ficheiros rotados com gzip
    compress

    # Não comprimir o ficheiro mais recente (pode ainda estar a ser lido)
    delaycompress

    # Não falhar se o ficheiro não existir
    missingok

    # Não rodar se o ficheiro estiver vazio
    notifempty

    # copytruncate: copia o ficheiro e trunca o original em vez de o renomear.
    # Necessário porque o Percona Audit Plugin mantém o file descriptor aberto.
    # Sem isto, o plugin continuaria a escrever para o ficheiro renomeado.
    # Desvantagem: janela mínima de perda de logs durante a cópia.
    copytruncate

    # Permissões do ficheiro rotado
    create 640 mysql adm
}
